<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Juego de adivina tu número</title>
    <style>
      html {
        font-family: sans-serif;
      }
      body {
        width: 50%;
        max-width: 800px;
        min-width: 480px;
        margin: 0 auto;
      }
      .lastResult {
        color: white;
        padding: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Juego Adivina tu número</h1>
    <p>Hemos seleccionado un número aleatorio entre 1 y 100. Trata de adivinar el número en un total de 10 turnos o menos. No te preocupes, te diremos si el número es más alto o más bajo.</p>
    
    <div class="form">
      <label for="guessField">Ingresa el número a adivinar: </label>
      <input type="number" id="guessField" class="guessField" min="1" max="100">
      <input type="submit" value="Ingresar el número aleatorio" class="guessSubmit">
    </div>

    <div class="resultParas">
      <p class="guesses"></p>
      <p class="lastResult"></p>
      <p class="lowOrHi"></p>
    </div>
  </body>

  <script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;
    const ATTEMPS = 10;
    const guesses = document.querySelector('.guesses');
    const lastResult = document.querySelector('.lastResult');
    const lowOrHi = document.querySelector('.lowOrHi');
    const guessSubmit = document.querySelector('.guessSubmit');
    const guessField = document.querySelector('.guessField');
    let guessCount = 1;
    let resetButton;

    function checkGuess() {
      const userGuess = Number(guessField.value);

      // VALIDACIÓN LÓGICA DE QA: Previene campos vacíos, strings u obsoletos fuera del rango 1-100
      if (guessField.value.trim() === "" || userGuess < 1 || userGuess > 100 || isNaN(userGuess)) {
        alert("Por favor, ingresa un número válido que esté estrictamente entre 1 y 100.");
        guessField.value = '';
        guessField.focus();
        return; // Evita el avance del contador de turnos (consumo injusto)
      }

      if (guessCount === 1) {
        guesses.textContent = 'Números anteriores: ';
      }
      guesses.textContent += userGuess + ' ';

      if (userGuess === randomNumber) {
        lastResult.textContent = '¡Felicidades! ¡Adivinaste el número!';
        lastResult.style.backgroundColor = 'green';
        lowOrHi.textContent = '';
        setGameOver();
      } else if (guessCount === ATTEMPS) {
        lastResult.textContent = `¡Fin del juego! El número era ${randomNumber}.`;
        lastResult.style.backgroundColor = 'red';
        setGameOver();
      } else {
        lastResult.textContent = '¡Incorrecto! ';
        // BUG 1 SOLUCIONADO: Cambiado de 'green' a 'red' para semáforo visual correcto de error
        lastResult.style.backgroundColor = 'red'; 
        if (userGuess < randomNumber) {
          lowOrHi.textContent = '¡El número es más alto!';
        } else if (userGuess > randomNumber) {
          lowOrHi.textContent = '¡El número es más bajo!';
        }
      }

      guessCount++;
      guessField.value = '';
      guessField.focus();
    }

    guessSubmit.addEventListener('click', checkGuess);

    function setGameOver() {
      guessField.disabled = true;
      guessSubmit.disabled = true;
      resetButton = document.createElement('button');
      resetButton.textContent = 'Comienza un nuevo juego';
      document.body.appendChild(resetButton);
      resetButton.addEventListener('click', resetGame);
    }

    function resetGame() {
      guessCount = 1;
      const resetParas = document.querySelectorAll('.resultParas p');
      for (let i = 0; i < resetParas.length; i++) {
        resetParas[i].textContent = '';
      }
      if (resetButton && resetButton.parentNode) {
        resetButton.parentNode.removeChild(resetButton);
      }
      guessField.disabled = false;
      guessSubmit.disabled = false;
      guessField.value = '';
      guessField.focus();
      
      // BUG 2 SOLUCIONADO: Fondo transparente para evitar texto invisible sobre fondo blanco
      lastResult.style.backgroundColor = 'transparent'; 
      randomNumber = Math.floor(Math.random() * 100) + 1;
    }
  </script>
</html>
